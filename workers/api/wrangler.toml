name = "kyzen-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Custom domain / route (update to your own domain once added to Cloudflare)
# routes = [
#   { pattern = "api.kyzen.dev/*", zone_name = "kyzen.dev" }
# ]

[observability]
enabled = true

# ---------------------------------------------------------------------------
# KV Namespaces
# ---------------------------------------------------------------------------
# RATE_LIMIT_KV  -> stores per-IP request counters for the rate limit middleware
# SHORTURL_KV    -> stores short code -> original URL mappings for /api/tools/shorturl
#
# Create these with:
#   wrangler kv namespace create "RATE_LIMIT_KV"
#   wrangler kv namespace create "SHORTURL_KV"
# then paste the generated IDs below.
# ---------------------------------------------------------------------------
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "REPLACE_WITH_RATE_LIMIT_KV_ID"

[[kv_namespaces]]
binding = "SHORTURL_KV"
id = "REPLACE_WITH_SHORTURL_KV_ID"

# ---------------------------------------------------------------------------
# Secrets (set with `wrangler secret put <NAME>`, do not hardcode here)
# ---------------------------------------------------------------------------
# OPENWEATHER_API_KEY
# EXCHANGE_RATE_API_KEY
# AI_API_KEY

[vars]
ENVIRONMENT = "production"
RATE_LIMIT_MAX = "60"
RATE_LIMIT_WINDOW_SECONDS = "60"
